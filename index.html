<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>羽見福餃V2 測試｜線上訂購</title>

<style>
*{
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    margin:0;
    background:#f5f5f5;
}

.container{
    max-width:700px;
    margin:20px auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#2e7d32;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
}

.card h3{
    margin:0 0 10px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#2e7d32;
    color:white;
    font-size:20px;
    border:none;
    border-radius:10px;
}

.total{
    font-size:28px;
    color:red;
    text-align:center;
    margin:20px 0;
    font-weight:bold;
}

.note{
    background:#fff8e1;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>🥟 羽見福餃 線上訂購</h1>

<div class="note">
營業時間：<br>
週一～週五 10:30～22:30<br>
週六、週日公休
</div>

<div id="products"><div class="card">
<h3>高麗菜水餃（7.5元/顆）</h3>
<select id="cabbage" onchange="calc()">
<option value="0">請選擇</option>
<option value="20">20 顆</option>
<option value="40">40 顆</option>
<option value="60">60 顆</option>
<option value="80">80 顆</option>
<option value="100">100 顆</option>
</select>
</div>

<div class="card">
<h3>韭菜水餃（7.5元/顆）</h3>
<select id="chive" onchange="calc()">
<option value="0">請選擇</option>
<option value="20">20 顆</option>
<option value="40">40 顆</option>
<option value="60">60 顆</option>
<option value="80">80 顆</option>
<option value="100">100 顆</option>
</select>
</div>

<div class="card">
<h3>玉米水餃（7.5元/顆）</h3>
<select id="corn" onchange="calc()">
<option value="0">請選擇</option>
<option value="20">20 顆</option>
<option value="40">40 顆</option>
<option value="60">60 顆</option>
<option value="80">80 顆</option>
<option value="100">100 顆</option>
</select>
</div>

<div class="card">
<h3>蔥肉水餃（7.5元/顆）</h3>
<select id="scallion" onchange="calc()">
<option value="0">請選擇</option>
<option value="20">20 顆</option>
<option value="40">40 顆</option>
<option value="60">60 顆</option>
<option value="80">80 顆</option>
<option value="100">100 顆</option>
</select>
</div>

<div class="card">
<h3>泡菜水餃（10元/顆）</h3>
<select id="kimchi" onchange="calc()">
<option value="0">請選擇</option>
<option value="20">20 顆</option>
<option value="40">40 顆</option>
<option value="60">60 顆</option>
<option value="80">80 顆</option>
<option value="100">100 顆</option>
</select>
</div>

<div class="card">
<h3>剝皮辣椒豬肉水餃（10元/顆）</h3>
<select id="pepper" onchange="calc()">
<option value="0">請選擇</option>
<option value="20">20 顆</option>
<option value="40">40 顆</option>
<option value="60">60 顆</option>
<option value="80">80 顆</option>
<option value="100">100 顆</option>
</select>
</div>

<div class="card">
<h3>鮮蝦水餃（15元/顆）</h3>
<select id="shrimp" onchange="calc()">
<option value="0">請選擇</option>
<option value="20">20 顆</option>
<option value="40">40 顆</option>
<option value="60">60 顆</option>
<option value="80">80 顆</option>
<option value="100">100 顆</option>
</select>
</div>

<div class="card">
<h3>泡菜鮮蝦水餃（15元/顆）</h3>
<select id="kimchiShrimp" onchange="calc()">
<option value="0">請選擇</option>
<option value="20">20 顆</option>
<option value="40">40 顆</option>
<option value="60">60 顆</option>
<option value="80">80 顆</option>
<option value="100">100 顆</option>
</select>
</div></div>

<h2>顧客資料</h2><h2>📦 運費說明</h2>

<div class="note">
🚚 自取：免運費<br>
🏪 全家店到店：100 元<br>
🚛 宅配：300 元<br><br>

🎉 <b>商品金額滿 3000 元免運費</b>
</div>

<h2>🚚 取貨方式</h2>

<label>
<input type="radio" name="ship" value="自取" checked>
自取（免運費）
</label><br>

<label>
<input type="radio" name="ship" value="全家店到店">
全家店到店（運費100元）
</label><br>

<label>
<input type="radio" name="ship" value="宅配">
宅配（運費300元）
</label>

<br><br>

<label>姓名</label>
<input type="text" id="name" placeholder="請輸入姓名">

<label>電話</label>
<input type="tel" id="phone" placeholder="請輸入電話">

<label>地址（自取可不填）</label>
<textarea id="address" placeholder="店到店或宅配請填寫完整地址"></textarea>

<label>備註</label>
<textarea id="note" placeholder="例如：不要香菜、下午取貨..."></textarea>

<div class="total">
總金額：
<span id="total">0</span> 元
</div>

<button onclick="submitOrder()">
送出訂單
</button><script>

const API="https://script.google.com/macros/s/AKfycbxUwUuaONyqF0PDyzmVRQN_ohD00-GC-IYAOKjeVFVs4HjzxPo2T8vamerw4pYClmGO2A/exec";

function v(id){
  return Number(document.getElementById(id).value);
}

function calc(){

  let total=0;

  total+=v("cabbage")*7.5;
  total+=v("chive")*7.5;
  total+=v("corn")*7.5;
  total+=v("scallion")*7.5;

  total+=v("kimchi")*10;
  total+=v("pepper")*10;

  total+=v("shrimp")*15;
  total+=v("kimchiShrimp")*15;

  document.getElementById("total").innerText=total;

}function submitOrder(){

  const data={
    name:document.getElementById("name").value,
    phone:document.getElementById("phone").value,
    address:document.getElementById("address").value,

    cabbage:v("cabbage"),
    chive:v("chive"),
    corn:v("corn"),
    scallion:v("scallion"),
    kimchi:v("kimchi"),
    pepper:v("pepper"),
    shrimp:v("shrimp"),
    kimchiShrimp:v("kimchiShrimp"),

    total:Number(document.getElementById("total").innerText),
    note:document.getElementById("note").value
  };

  if(data.name==""){
    alert("請輸入姓名");
    return;
  }

  if(data.phone==""){
    alert("請輸入電話");
    return;
  }

  fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"text/plain;charset=utf-8"
    },
    body:JSON.stringify(data)
  })
  .then(r=>r.json())
  .then(res=>{

      if(res.success){

          alert("訂單送出成功！");

          location.reload();

      }else{

          alert("送出失敗：" + res.error);

      }

  })
  .catch(err=>{

      alert("連線失敗\n"+err);

  });

}

</script>

</body>
</html>
